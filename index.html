<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfert Visuel Haute Vitesse</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
        <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; max-width: 500px; margin: auto; background: #121212; color: #e0e0e0; }
        .section { border: 1px solid #333; padding: 15px; margin: 15px 0; border-radius: 8px; background: #1e1e1e; }
        #qrcode-target { display: inline-block; margin: 15px auto; padding: 10px; background: white; border-radius: 4px; min-height: 250px; min-width: 250px; }
        button { padding: 12px 24px; background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; width: 100%; }
        #reader { width: 100%; max-width: 400px; margin: auto; border: 1px solid #444; background: #000; }
        .progress { font-weight: bold; color: #007bff; margin: 10px 0; }
    </style>
</head>
<body>

    <h2>⚡ Transfert Écran-Caméra Ultra-Rapide 📸</h2>
    <p>Cette version corrige l'affichage et pousse le rafraîchissement au maximum supporté par l'iPhone.</p>

    <div class="section">
        <h3>1. Émetteur (Chrome)</h3>
        <input type="file" id="fileInput"><br>
        <div id="qrcode-target"></div>
        <div id="sendProgress" class="progress">En attente d'un fichier...</div>
    </div>

    <div class="section">
        <h3>2. Récepteur (Safari iOS)</h3>
        <button id="startScan">Démarrer la Caméra (60 FPS)</button><br><br>
        <div id="reader"></div>
        <div id="recvProgress" class="progress">Prêt à scanner...</div>
        <div id="downloadArea"></div>
    </div>

    <script>
        // --- LOGIQUE ÉMETTEUR ---
        const fileInput = document.getElementById('fileInput');
        const qrContainer = document.getElementById('qrcode-target');
        const sendProgress = document.getElementById('sendProgress');
        let intervalId = null;

        // Instance unique du générateur QR Code (Taille 250x250, Correction L = Low pour maximiser le stockage)
        let qrMaker = new QRCode(qrContainer, {
            width: 250,
            height: 250,
            correctLevel: QRCode.CorrectLevel.L
        });

        fileInput.onchange = function() {
            const file = fileInput.files[0];
            if (!file) return;

            // Nettoyer un ancien envoi si existant
            if (intervalId) clearInterval(intervalId);

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result.split(',')[1];
                const payload = JSON.stringify({ n: file.name, d: base64Data });
                
                // Densité maximale : 2000 caractères par QR Code grâce à la correction 'L'
                const chunkSize = 2000; 
                const chunks = [];
                for (let i = 0; i < payload.length; i += chunkSize) {
                    chunks.push(payload.substr(i, chunkSize));
                }

                let currentChunk = 0;
                const total = chunks.length;

                // Clignotement ultra-rapide (100ms) pour bombarder la caméra de l'iPhone
                intervalId = setInterval(() => {
                    // Format optimisé pour un parsing rapide : "index/total|données"
                    const dataString = `${currentChunk}/${total}|${chunks[currentChunk]}`;
                    qrMaker.makeCode(dataString);
                    
                    sendProgress.innerText = `Émission : Bloc ${currentChunk + 1} / ${total}`;
                    currentChunk = (currentChunk + 1) % total;
                }, 100); 
            };
            reader.readAsDataURL(file);
        };

        // --- LOGIQUE RÉCEPTEUR ---
        const startScanBtn = document.getElementById('startScan');
        const recvProgress = document.getElementById('recvProgress');
        const downloadArea = document.getElementById('downloadArea');
        
        let receivedChunks = {};
        let totalChunks = -1;
        let html5QrcodeScanner = null;

        startScanBtn.onclick = function() {
            if (html5QrcodeScanner) return; // Évite les doubles lancements

            html5QrcodeScanner = new Html5Qrcode("reader");
            
            // Forcer le capteur à 60 FPS avec une zone de scan carrée
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { 
                    fps: 60, 
                    qrbox: { width: 250, height: 250 },
                    experimentalFeatures: { useBarCodeDetectorIfSupported: true } 
                },
                (decodedText) => {
                    // Parsing ultra-rapide sans Regex lourde
                    const pipeIndex = decodedText.indexOf('|');
                    const slashIndex = decodedText.indexOf('/');
                    
                    if (pipeIndex !== -1 && slashIndex !== -1) {
                        const index = parseInt(decodedText.substring(0, slashIndex));
                        totalChunks = parseInt(decodedText.substring(slashIndex + 1, pipeIndex));
                        const data = decodedText.substring(pipeIndex + 1);

                        if (!receivedChunks[index]) {
                            receivedChunks[index] = data;
                            const count = Object.keys(receivedChunks).length;
                            recvProgress.innerText = `Fragments capturés : ${count} / ${totalChunks}`;

                            // Dès que l'iPhone a capturé tous les morceaux uniques
                            if (count === totalChunks) {
                                html5QrcodeScanner.stop().then(() => {
                                    assembleFile();
                                });
                            }
                        }
                    }
                },
                (errorMessage) => {
                    // On ignore les erreurs de scan continu pour ne pas ralentir le CPU
                }
            ).catch(err => alert("Erreur d'accès caméra : " + err));
        };

        function assembleFile() {
            recvProgress.innerText = "Recomposition du fichier...";
            let fullPayload = "";
            for (let i = 0; i < totalChunks; i++) {
                fullPayload += receivedChunks[i];
            }

            try {
                const fileObj = JSON.parse(fullPayload);
                
                // Conversion Base64 -> Blob binaire
                const byteCharacters = atob(fileObj.d);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const blob = new Blob([new Uint8Array(byteNumbers)], {type: "application/octet-stream"});
                const url = URL.createObjectURL(blob);
                
                downloadArea.innerHTML = `<a href="${url}" download="${fileObj.n}" style="display:inline-block; margin-top:15px; padding:15px; background:#007bff; color:white; text-decoration:none; border-radius:4px; font-weight:bold;">💾 Télécharger : ${fileObj.n}</a>`;
                recvProgress.innerText = "✓ Fichier prêt au téléchargement !";
            } catch (e) {
                recvProgress.innerText = "❌ Erreur de corruption (Données manquantes). Recommencez.";
                receivedChunks = {}; // Reset
            }
        }
    </script>
</body>
</html>
